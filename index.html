<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen2.5-7B Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-950 text-gray-100 h-screen flex overflow-hidden">
    <div class="flex h-screen w-full">
        <!-- Sidebar -->
        <div class="w-72 bg-gray-900 border-r border-gray-800 flex flex-col">
            <div class="p-6 border-b border-gray-800">
                <h1 class="text-2xl font-bold">Qwen2.5-7B</h1>
                <p class="text-emerald-400 text-sm">Local Model • LM Studio</p>
            </div>
            <div class="p-4">
                <button onclick="newChat()" class="w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-2xl">
                    New Chat
                </button>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="flex-1 flex flex-col">
            <div class="h-14 border-b border-gray-800 bg-gray-900 px-6 flex items-center">
                <span id="status" class="text-emerald-400">✅ Connected to Local Qwen2.5-7B</span>
            </div>

            <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-6 bg-gray-950"></div>

            <div class="p-6 border-t border-gray-800 bg-gray-900">
                <textarea id="user-input" rows="2" 
                    class="w-full bg-gray-800 border border-gray-700 rounded-3xl py-5 px-6 resize-none focus:outline-none"
                    placeholder="Ask anything..."></textarea>
                <button onclick="sendMessage()" 
                        class="mt-4 px-10 py-3 bg-blue-600 hover:bg-blue-500 rounded-2xl font-medium">
                    Send
                </button>
            </div>
        </div>
    </div>

    <script>
        let chatHistory = [];

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) return;

            addMessage('user', message);
            input.value = '';

            const typingId = addTypingIndicator();

            try {
                const response = await fetch('http://localhost:1234/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "local-model",
                        messages: [
                            { role: "system", content: "You are Qwen2.5, a helpful and honest AI." },
                            ...chatHistory,
                            { role: "user", content: message }
                        ],
                        temperature: 0.7,
                        max_tokens: 1024
                    })
                });

                const data = await response.json();
                const aiReply = data.choices[0].message.content;

                removeTypingIndicator(typingId);
                addMessage('ai', aiReply);

                chatHistory.push({ role: "user", content: message });
                chatHistory.push({ role: "assistant", content: aiReply });
            } catch (e) {
                removeTypingIndicator(typingId);
                addMessage('ai', "Make sure LM Studio server is running on port 1234");
            }
        }

        function addMessage(role, content) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `
                <div class="${role === 'user' ? 'bg-blue-600' : 'bg-gray-700'} max-w-[80%] px-6 py-4 rounded-3xl">
                    ${content}
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function addTypingIndicator() {
            const id = 'typing-' + Date.now();
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex justify-start";
            div.innerHTML = `<div class="bg-gray-700 px-6 py-4 rounded-3xl">Qwen is thinking...</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return id;
        }

        function removeTypingIndicator(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function newChat() {
            chatHistory = [];
            document.getElementById('chat-messages').innerHTML = '';
        }

        // Enter key support
        document.getElementById('user-input').addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
