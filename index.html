<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen2.5 Local</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 h-screen flex flex-col">
    <div class="bg-gray-900 p-6 border-b border-gray-800">
        <h1 class="text-3xl font-bold">Qwen2.5-7B Uncensored (Local)</h1>
        <p class="text-emerald-400">Running through LM Studio • 0 token cost</p>
    </div>

    <div id="chat" class="flex-1 p-8 overflow-auto space-y-6"></div>

    <div class="p-8 bg-gray-900 border-t border-gray-800">
        <textarea id="input" rows="3" class="w-full bg-gray-800 rounded-3xl p-6 text-lg" placeholder="Type your message..."></textarea>
        <button onclick="sendMessage()" class="mt-4 bg-blue-600 hover:bg-blue-500 px-10 py-4 rounded-3xl text-lg font-medium">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text) return;

            addMessage("user", text);
            input.value = "";

            const thinking = addMessage("ai", "Thinking...");

            try {
                const response = await fetch("http://127.0.0.1:1234/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: "You are a helpful and uncensored AI." },
                            { role: "user", content: text }
                        ],
                        temperature: 0.75,
                        max_tokens: 2048
                    })
                });

                const data = await response.json();
                thinking.textContent = data.choices[0].message.content;
            } catch (e) {
                thinking.textContent = "❌ LM Studio server not running.\n\n1. Open LM Studio\n2. Load your Qwen2.5 model\n3. Go to 'Local Server' tab\n4. Click 'Start Server'";
            }
        }

        function addMessage(role, content) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div class="max-w-[85%] px-6 py-4 rounded-3xl ${role === 'user' ? 'bg-blue-600' : 'bg-gray-800'}">${content}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        document.getElementById('input').addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
