<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen2.5-7B GGUF (Split Support)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@wllama/wllama@latest/dist/wllama.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 h-screen flex flex-col">
    <div class="p-6 bg-gray-900 border-b border-gray-800">
        <h1 class="text-3xl font-bold">Qwen2.5-7B GGUF Loader</h1>
        <p id="status" class="text-yellow-400 mt-2">Select your GGUF file(s) — supports split models up to 8GB+</p>
    </div>

    <div class="flex-1 p-6 overflow-auto" id="chat"></div>

    <div class="p-6 bg-gray-900 border-t border-gray-800">
        <input type="file" id="file-input" accept=".gguf" multiple class="hidden">
        
        <button onclick="document.getElementById('file-input').click()" 
                class="bg-blue-600 hover:bg-blue-500 px-8 py-4 rounded-2xl text-lg font-medium w-full mb-4">
            📁 Select GGUF File(s) — Single or Split
        </button>
        
        <textarea id="input" rows="3" class="w-full bg-gray-800 rounded-3xl p-5 hidden" placeholder="Type your message..."></textarea>
        <button onclick="sendMessage()" id="send-btn" class="mt-3 bg-blue-600 hover:bg-blue-500 px-10 py-4 rounded-2xl hidden w-full">Send</button>
    </div>

    <script>
        let wllama = null;

        document.getElementById('file-input').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            const status = document.getElementById('status');
            status.textContent = `Loading ${files.length} file(s)...`;

            try {
                wllama = new Wllama();

                await wllama.loadModelFromFiles(files, {
                    progressCallback: (progress) => {
                        status.textContent = `Loading: ${Math.round(progress * 100)}%`;
                    },
                    contextLength: 4096,   // Lower for large models
                });

                status.innerHTML = `✅ Loaded ${files[0].name} successfully!`;

                document.getElementById('input').classList.remove('hidden');
                document.getElementById('send-btn').classList.remove('hidden');
                
                addMessage('ai', "Model loaded! Running fully locally. No tokens, no limits.");
            } catch (err) {
                console.error(err);
                status.innerHTML = `❌ Failed.<br>Try splitting your GGUF into parts under 2GB each using llama-gguf-split.`;
            }
        });

        async function sendMessage() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text || !wllama) return;

            addMessage('user', text);
            input.value = "";

            const thinking = addMessage('ai', 'Thinking...');

            try {
                const result = await wllama.createCompletion(text, {
                    nPredict: 768,
                    temperature: 0.7,
                });
                thinking.textContent = result.text;
            } catch (err) {
                thinking.textContent = "Out of memory or error during generation.";
            }
        }

        function addMessage(role, content) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} mb-6`;
            div.innerHTML = `
                <div class="max-w-[85%] px-6 py-4 rounded-3xl ${role === 'user' ? 'bg-blue-600' : 'bg-gray-800'}">
                    ${content}
                </div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        document.getElementById('input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
