<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Local Qwen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2"></script>
</head>
<body class="bg-gray-950 text-gray-100 h-screen flex flex-col">
    <div class="p-6 bg-gray-900 border-b border-gray-800">
        <h1 class="text-2xl font-bold">Qwen2.5 Local (Free)</h1>
        <p id="status" class="text-yellow-400 mt-1">Loading model...</p>
    </div>

    <div id="chat" class="flex-1 overflow-auto p-6 space-y-8"></div>

    <div class="p-6 bg-gray-900 border-t border-gray-800">
        <textarea id="input" rows="2" class="w-full bg-gray-800 border border-gray-700 rounded-3xl p-5 focus:outline-none focus:border-blue-500" placeholder="Type here..."></textarea>
        <button onclick="sendMessage()" class="mt-4 bg-blue-600 hover:bg-blue-500 px-8 py-3 rounded-2xl">Send</button>
    </div>

    <script>
        let generator = null;

        async function loadModel() {
            const status = document.getElementById('status');
            try {
                status.textContent = "Downloading model (~1.5GB, first time only)...";

                generator = await pipeline('text-generation', 'Xenova/Qwen2.5-3B-Instruct', {
                    device: 'webgpu',
                    dtype: 'q4',
                    progress_callback: (data) => {
                        if (data.progress) status.textContent = `Loading: ${Math.round(data.progress)}%`;
                    }
                });

                status.textContent = "✅ Model Ready - No tokens, completely free";
                addMessage("ai", "Hello! I'm running locally. No API costs. Ask me anything.");
            } catch (e) {
                console.error(e);
                status.textContent = "❌ Error. Try Chrome and refresh.";
            }
        }

        async function sendMessage() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text || !generator) return;

            addMessage("user", text);
            input.value = "";

            const thinking = addMessage("ai", "Thinking...");

            try {
                const output = await generator(text, { max_new_tokens: 512, temperature: 0.7 });
                thinking.textContent = output[0].generated_text;
            } catch (err) {
                thinking.textContent = "Error generating response.";
            }
        }

        function addMessage(role, content) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div class="max-w-[80%] px-6 py-4 rounded-3xl ${role === 'user' ? 'bg-blue-600' : 'bg-gray-800'}">${content}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div.querySelector('div');
        }

        window.onload = loadModel;
    </script>
</body>
</html>
